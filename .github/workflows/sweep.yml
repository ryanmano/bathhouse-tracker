name: prestart-sweep

# Lightweight pre-start check: every 5 minutes during venue operating hours
# (5am-11:55pm ET), snapshot only the sessions starting in the next few
# minutes — captures the final booking rush right before class begins.
on:
  schedule:
    # offset from :00/:05 marks — GitHub sheds load on round minutes
    - cron: "2-57/5 9-23 * * *"  # 5:00am-7:55pm ET (EDT)
    - cron: "2-57/5 0-3 * * *"   # 8:00pm-11:55pm ET (EDT)
  workflow_dispatch: {}

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pre-start sweep
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python run.py --sweep
