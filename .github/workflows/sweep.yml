name: prestart-sweep

# Lightweight pre-start check: snapshot only the sessions starting in the next
# few minutes — captures the final booking rush right before class begins.
#
# Triggered every 5 minutes by the Supabase pg_cron scheduler via
# workflow_dispatch (reliable). GitHub's own `schedule:` cron was removed: it
# was redundant with the dispatch trigger and mostly load-shed by GitHub, so it
# only added occasional "run cancelled" noise.
on:
  workflow_dispatch: {}

# Never let queued runs pile up and cancel each other; a run either starts or
# is skipped, and the next dispatch (5 min later) covers any gap.
concurrency:
  group: prestart-sweep
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pre-start sweep
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python run.py --sweep
